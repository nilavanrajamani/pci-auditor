# PCI DSS 4.0 Compliance Audit Pipeline
#
# Two jobs:
#   pci-pr-scan     – triggered on every pull request; scans only changed lines
#   pci-full-scan   – triggered on merge to main; scans the entire codebase
#
# Required pipeline secret variables (set in Azure DevOps Library or pipeline settings):
#   AZURE_OPENAI_ENDPOINT      – e.g. https://<resource>.openai.azure.com/
#   AZURE_OPENAI_API_KEY       – Azure OpenAI API key
#   AZURE_OPENAI_DEPLOYMENT    – Azure AI Foundry deployment name (e.g. gpt-4o)
#   AZURE_OPENAI_API_VERSION   – (optional) API version, default 2024-02-01

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

variables:
  pythonVersion: "3.11"
  sarifOutputDir: "$(Build.ArtifactStagingDirectory)/pci-results"

stages:

  # ---------------------------------------------------------------------------
  # Stage 1: PR Scan (runs on pull requests only)
  # ---------------------------------------------------------------------------
  - stage: PciPrScan
    displayName: "PCI DSS PR Scan"
    condition: eq(variables['Build.Reason'], 'PullRequest')
    jobs:
      - job: ScanPR
        displayName: "Scan PR changed files"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self
            fetchDepth: 0        # Full history needed for accurate git diff
            displayName: "Checkout (full history)"

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"
            displayName: "Set up Python $(pythonVersion)"

          - script: |
              python -m pip install --upgrade pip
              pip install .
            displayName: "Install pci-auditor"

          - script: |
              mkdir -p "$(sarifOutputDir)"
            displayName: "Create output directory"

          - script: |
              pci-auditor scan pr \
                --repo-path "$(Build.SourcesDirectory)" \
                --base-branch "origin/$(System.PullRequest.TargetBranch)" \
                --head HEAD \
                --output-format sarif \
                --output-file "$(sarifOutputDir)/pci-pr-results.sarif" \
                --fail-on critical,high
            displayName: "Run PCI PR scan"
            env:
              AZURE_OPENAI_ENDPOINT: $(AZURE_OPENAI_ENDPOINT)
              AZURE_OPENAI_API_KEY: $(AZURE_OPENAI_API_KEY)
              AZURE_OPENAI_DEPLOYMENT: $(AZURE_OPENAI_DEPLOYMENT)
              AZURE_OPENAI_API_VERSION: $(AZURE_OPENAI_API_VERSION)
            # Exit code 1 = violations found → task fails → PR build fails
            failOnStderr: false

          - task: PublishBuildArtifacts@1
            condition: always()     # Upload results even on failure
            inputs:
              PathtoPublish: "$(sarifOutputDir)"
              ArtifactName: "pci-audit-results"
            displayName: "Publish SARIF results"

          # Optional: publish to Azure DevOps Security tab
          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: "$(sarifOutputDir)/pci-pr-results.sarif"
              artifact: "CodeAnalysisLogs"
              publishLocation: "pipeline"
            displayName: "Publish SARIF to Security tab"
            continueOnError: true

  # ---------------------------------------------------------------------------
  # Stage 2: Full Codebase Scan (runs on merge to main/develop)
  # ---------------------------------------------------------------------------
  - stage: PciFullScan
    displayName: "PCI DSS Full Codebase Scan"
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: ScanCodebase
        displayName: "Scan entire codebase"
        pool:
          vmImage: "ubuntu-latest"
        steps:
          - checkout: self
            fetchDepth: 1
            displayName: "Checkout"

          - task: UsePythonVersion@0
            inputs:
              versionSpec: "$(pythonVersion)"
            displayName: "Set up Python $(pythonVersion)"

          - script: |
              python -m pip install --upgrade pip
              pip install .
            displayName: "Install pci-auditor"

          - script: |
              mkdir -p "$(sarifOutputDir)"
            displayName: "Create output directory"

          # Update rules from official source before scanning
          - script: |
              pci-auditor rules update || echo "Rule update failed, using bundled rules"
              pci-auditor rules info
            displayName: "Update PCI DSS rules"
            continueOnError: true

          - script: |
              pci-auditor scan codebase \
                --path "$(Build.SourcesDirectory)" \
                --output-format sarif \
                --output-file "$(sarifOutputDir)/pci-full-results.sarif" \
                --fail-on critical,high
            displayName: "Run PCI full codebase scan"
            env:
              AZURE_OPENAI_ENDPOINT: $(AZURE_OPENAI_ENDPOINT)
              AZURE_OPENAI_API_KEY: $(AZURE_OPENAI_API_KEY)
              AZURE_OPENAI_DEPLOYMENT: $(AZURE_OPENAI_DEPLOYMENT)
              AZURE_OPENAI_API_VERSION: $(AZURE_OPENAI_API_VERSION)
            failOnStderr: false

          # JSON report for downstream tooling / dashboards
          - script: |
              pci-auditor scan codebase \
                --path "$(Build.SourcesDirectory)" \
                --output-format json \
                --output-file "$(sarifOutputDir)/pci-full-results.json" \
                --no-ai \
                --fail-on none
            displayName: "Generate JSON report"
            continueOnError: true

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              PathtoPublish: "$(sarifOutputDir)"
              ArtifactName: "pci-audit-results"
            displayName: "Publish audit results"

          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: "$(sarifOutputDir)/pci-full-results.sarif"
              artifact: "CodeAnalysisLogs"
              publishLocation: "pipeline"
            displayName: "Publish SARIF to Security tab"
            continueOnError: true
