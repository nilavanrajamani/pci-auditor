# PCI DSS 4.0 Compliance Audit — GitHub Actions
#
# Two jobs:
#   pr-scan     — triggered on every pull request; scans only changed lines
#   full-scan   — triggered on push to main/develop; scans the entire codebase
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   AZURE_OPENAI_ENDPOINT                – https://<resource>.openai.azure.com/
#   AZURE_OPENAI_API_KEY                 – Azure OpenAI API key
#   AZURE_OPENAI_DEPLOYMENT              – Chat deployment name (e.g. gpt-4.1-mini)
#   AZURE_OPENAI_API_VERSION             – API version (e.g. 2024-12-01-preview)
#
# Optional secrets (enable RAG — improves accuracy, reduces token cost):
#   AZURE_OPENAI_EMBEDDING_DEPLOYMENT    – Embedding deployment (e.g. text-embedding-3-small)
#
# Optional secrets (enable Azure AI Search backend instead of local cosine index):
#   AZURE_SEARCH_ENDPOINT                – https://<search>.search.windows.net
#   AZURE_SEARCH_API_KEY                 – Azure AI Search admin/query key
#   AZURE_SEARCH_INDEX_NAME              – Index name (e.g. pci-rules)
#
# SARIF results are uploaded to the repository Security tab automatically.
# Findings appear as code scanning alerts with file/line annotations.

name: PCI DSS Compliance Audit

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write   # required to upload SARIF to GitHub Security tab
  pull-requests: write     # allows posting a PR comment with the summary (optional step)

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: PR Scan — scans only lines changed in this pull request
  # ---------------------------------------------------------------------------
  pr-scan:
    name: PCI DSS PR Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout (full history for git diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history required for accurate git diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pci-auditor
        run: |
          python -m pip install --upgrade pip
          pip install .

      # Cache the local rule embedding index keyed by pci_rules.json content.
      # If the rules haven't changed, the index is reused — no API call needed.
      - name: Cache rule embeddings
        uses: actions/cache@v4
        with:
          path: ~/.pci-auditor/rule_embeddings.json
          key: pci-embeddings-${{ hashFiles('pci_auditor/rules/pci_rules.json') }}

      # Build the embedding index only if the cache was not restored.
      # Skip silently if AZURE_OPENAI_EMBEDDING_DEPLOYMENT is not configured.
      - name: Build rule embedding index (RAG)
        if: env.AZURE_OPENAI_EMBEDDING_DEPLOYMENT != ''
        run: pci-auditor rules index-build || echo "Index build failed — will use all rules"
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}
        continue-on-error: true

      - name: Run PCI PR scan (SARIF)
        run: |
          mkdir -p pci-results
          pci-auditor scan pr \
            --repo-path "$GITHUB_WORKSPACE" \
            --base-branch "origin/${{ github.event.pull_request.base.ref }}" \
            --head HEAD \
            --output-format sarif \
            --output-file pci-results/pci-pr-results.sarif \
            --fail-on critical,high
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}

      # Upload SARIF → GitHub Security tab → inline PR annotations
      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pci-results/pci-pr-results.sarif
          category: pci-dss-pr

      - name: Upload SARIF as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pci-pr-results
          path: pci-results/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 2: Full Codebase Scan — runs on every push to main/develop
  # ---------------------------------------------------------------------------
  full-scan:
    name: PCI DSS Full Codebase Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pci-auditor
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Cache rule embeddings
        uses: actions/cache@v4
        with:
          path: ~/.pci-auditor/rule_embeddings.json
          key: pci-embeddings-${{ hashFiles('pci_auditor/rules/pci_rules.json') }}

      - name: Build rule embedding index (RAG)
        if: env.AZURE_OPENAI_EMBEDDING_DEPLOYMENT != ''
        run: pci-auditor rules index-build || echo "Index build failed — will use all rules"
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}
        continue-on-error: true

      - name: Run PCI full codebase scan (SARIF)
        run: |
          mkdir -p pci-results
          pci-auditor scan codebase \
            --path "$GITHUB_WORKSPACE" \
            --output-format sarif \
            --output-file pci-results/pci-full-results.sarif \
            --fail-on critical,high
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}

      # Also produce a JSON report for downstream tooling / dashboards
      - name: Generate JSON report (pattern-only, non-blocking)
        run: |
          pci-auditor scan codebase \
            --path "$GITHUB_WORKSPACE" \
            --output-format json \
            --output-file pci-results/pci-full-results.json \
            --no-ai \
            --fail-on none
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pci-results/pci-full-results.sarif
          category: pci-dss-full

      - name: Upload results as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pci-full-results
          path: pci-results/
          retention-days: 90
