# PCI DSS 4.0 Compliance Audit — Reusable Workflow
#
# This workflow is called from target repositories (like pci-vulnerable-app).
# It uses secrets from the pci-auditor repository via 'secrets: inherit'.
#
# Called by:
#   uses: nilavanrajamani/pci-auditor/.github/workflows/pci-scan-reusable.yml@main
#   with:
#     scan_type: 'codebase'  # or 'pr'
#   secrets: inherit

name: PCI DSS Reusable Scan

on:
  workflow_call:
    inputs:
      scan_type:
        description: 'Type of scan (pr or codebase)'
        required: false
        default: 'codebase'
        type: string
      path:
        description: 'Path to scan'
        required: false
        default: '.'
        type: string
      output_format:
        description: 'Output format (console, json, sarif)'
        required: false
        default: 'sarif'
        type: string
      output_fiale:
        description: 'Output file path'
        required: false
        default: 'pci-results.sarif'
        type: string
      fail_on:
        description: 'Severities to fail on'
        required: false
        default: 'critical,high'
        type: string
      no_ai:
        description: 'Disable AI analysis'
        required: false
        default: false
        type: boolean
    secrets:
      AZURE_OPENAI_ENDPOINT:
        required: true
      AZURE_OPENAI_API_KEY:
        required: true
      AZURE_OPENAI_DEPLOYMENT:
        required: true
      AZURE_OPENAI_API_VERSION:
        required: true
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT:
        required: false
      AZURE_SEARCH_ENDPOINT:
        required: false
      AZURE_SEARCH_API_KEY:
        required: false
      AZURE_SEARCH_INDEX_NAME:
        required: false

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  pr-scan:
    name: PCI DSS PR Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout (full history for git diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pci-auditor from main repo
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/nilavanrajamani/pci-auditor.git@main

      - name: Cache rule embeddings
        uses: actions/cache@v4
        with:
          path: ~/.pci-auditor/rule_embeddings.json
          key: pci-embeddings-${{ hashFiles('https://raw.githubusercontent.com/nilavanrajamani/pci-auditor/main/pci_auditor/rules/pci_rules.json') }}

      - name: Build rule embedding index (RAG)
        if: secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT != ''
        run: pci-auditor rules index-build || echo "Index build failed — will use all rules"
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}
        continue-on-error: true

      - name: Run PCI PR scan
        run: |
          mkdir -p pci-results
          pci-auditor scan pr \
            --repo-path "$GITHUB_WORKSPACE" \
            --base-branch "origin/${{ github.event.pull_request.base.ref }}" \
            --head HEAD \
            --output-format sarif \
            --output-file pci-results/pci-pr-results.sarif \
            --fail-on ${{ inputs.fail_on }}
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pci-results/pci-pr-results.sarif
          category: pci-dss-pr

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pci-pr-results
          path: pci-results/
          retention-days: 30

  full-scan:
    name: PCI DSS Full Codebase Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pci-auditor from main repo
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/nilavanrajamani/pci-auditor.git@main

      - name: Cache rule embeddings
        uses: actions/cache@v4
        with:
          path: ~/.pci-auditor/rule_embeddings.json
          key: pci-embeddings-${{ hashFiles('https://raw.githubusercontent.com/nilavanrajamani/pci-auditor/main/pci_auditor/rules/pci_rules.json') }}

      - name: Build rule embedding index (RAG)
        if: secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT != ''
        run: pci-auditor rules index-build || echo "Index build failed — will use all rules"
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}
        continue-on-error: true

      - name: Run PCI full codebase scan
        run: |
          mkdir -p pci-results
          pci-auditor scan codebase \
            --path "${{ inputs.path }}" \
            --output-format ${{ inputs.output_format }} \
            --output-file pci-results/${{ inputs.output_file }} \
            --fail-on ${{ inputs.fail_on }} ${{ inputs.no_ai && '--no-ai' || '' }}
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pci-results/${{ inputs.output_file }}
          category: pci-dss-full

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pci-full-results
          path: pci-results/
          retention-days: 30

  manual-scan:
    name: PCI DSS Manual Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pci-auditor from main repo
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/nilavanrajamani/pci-auditor.git@main

      - name: Cache rule embeddings
        uses: actions/cache@v4
        with:
          path: ~/.pci-auditor/rule_embeddings.json
          key: pci-embeddings-${{ hashFiles('https://raw.githubusercontent.com/nilavanrajamani/pci-auditor/main/pci_auditor/rules/pci_rules.json') }}

      - name: Build rule embedding index (RAG)
        if: secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT != ''
        run: pci-auditor rules index-build || echo "Index build failed — will use all rules"
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}
        continue-on-error: true

      - name: Run PCI scan (dispatch)
        run: |
          mkdir -p pci-results
          if [ "${{ inputs.scan_type }}" == "pr" ]; then
            pci-auditor scan pr \
              --repo-path "$GITHUB_WORKSPACE" \
              --base-branch "origin/main" \
              --head HEAD \
              --output-format ${{ inputs.output_format }} \
              --output-file pci-results/${{ inputs.output_file }} \
              --fail-on ${{ inputs.fail_on }} ${{ inputs.no_ai && '--no-ai' || '' }}
          else
            pci-auditor scan codebase \
              --path "${{ inputs.path }}" \
              --output-format ${{ inputs.output_format }} \
              --output-file pci-results/${{ inputs.output_file }} \
              --fail-on ${{ inputs.fail_on }} ${{ inputs.no_ai && '--no-ai' || '' }}
          fi
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}

      - name: Upload SARIF to GitHub Security tab
        if: always() && inputs.output_format == 'sarif'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pci-results/${{ inputs.output_file }}
          category: pci-dss-manual

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pci-manual-results
          path: pci-results/
          retention-days: 30