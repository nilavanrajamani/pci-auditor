# PCI DSS 4.0 — PR Scan Reusable Workflow
#
# Scans only the files changed in a pull request.
# Called by:
#   uses: nilavanrajamani/pci-auditor/.github/workflows/pci-pr-scan.yml@main
#   secrets: inherit

name: PCI DSS PR Scan

on:
  workflow_call:
    inputs:
      base_branch:
        description: 'Base branch for PR diff (e.g. main)'
        required: false
        default: 'main'
        type: string
      fail_on:
        description: 'Severities to fail on (comma-separated)'
        required: false
        default: 'critical,high'
        type: string
    secrets:
      AZURE_OPENAI_ENDPOINT:
        required: true
      AZURE_OPENAI_API_KEY:
        required: true
      AZURE_OPENAI_DEPLOYMENT:
        required: true
      AZURE_OPENAI_API_VERSION:
        required: true
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT:
        required: false
      AZURE_SEARCH_ENDPOINT:
        required: false
      AZURE_SEARCH_API_KEY:
        required: false
      AZURE_SEARCH_INDEX_NAME:
        required: false

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  pr-scan:
    name: PCI DSS PR Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for git diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pci-auditor
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/nilavanrajamani/pci-auditor.git@main

      - name: Cache rule embeddings
        uses: actions/cache@v4
        with:
          path: ~/.pci-auditor/rule_embeddings.json
          key: pci-embeddings-${{ hashFiles('**/pci_rules.json') }}

      - name: Build rule embedding index (RAG)
        run: pci-auditor rules index-build --backend azure-search || echo "Index build failed — will use all rules"
        continue-on-error: true
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}

      - name: Run PCI PR scan
        run: |
          mkdir -p pci-results
          pci-auditor scan pr \
            --repo-path "$GITHUB_WORKSPACE" \
            --base-branch "origin/${{ inputs.base_branch }}" \
            --head HEAD \
            --output-format sarif \
            --output-file pci-results/pci-pr-results.sarif \
            --fail-on ${{ inputs.fail_on }}
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_API_KEY: ${{ secrets.AZURE_SEARCH_API_KEY }}
          AZURE_SEARCH_INDEX_NAME: ${{ secrets.AZURE_SEARCH_INDEX_NAME }}

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pci-results/pci-pr-results.sarif
          category: pci-dss-manual

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pci-pr-results
          path: pci-results/
          retention-days: 30
